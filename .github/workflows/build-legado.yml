name: Build Legado

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '版本标签 (如 v1.0.0)'
        required: true
        type: string
      arch:
        description: '目标架构'
        required: true
        type: choice
        options:
          - arm64-v8a
          - armeabi-v7a
          - x86_64
          - x86
        default: arm64-v8a

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Generate keystore for APK signing
        run: |
          keytool -genkey -v -keystore release.keystore -alias release \
            -keyalg RSA -keysize 2048 -validity 3650 \
            -storepass legado -keypass legado \
            -dname "CN=Legado, OU=Dev, O=Legado, L=City, ST=State, C=CN"
          echo "KEYSTORE_PATH=${{ github.workspace }}/release.keystore" >> $GITHUB_ENV
          echo "KEYSTORE_PASSWORD=legado" >> $GITHUB_ENV
          echo "KEY_ALIAS=release" >> $GITHUB_ENV
          echo "KEY_PASSWORD=legado" >> $GITHUB_ENV

      - name: Build Release APK (${{ inputs.arch }})
        run: ./gradlew assembleRelease -Pandroid.injected.abifilters=${{ inputs.arch }} --no-configuration-cache --parallel
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Rename APK
        run: |
          apk=$(find app/ -name "*.apk" | head -1)
          echo "Found APK: $apk"
          dir=$(dirname "$apk")
          mv "$apk" "$dir/Legado-${{ inputs.tag }}-${{ inputs.arch }}.apk"
          echo "APK_DIR=$dir" >> $GITHUB_ENV

      - name: Create Release & Upload APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          name: Legado ${{ inputs.tag }}
          body: |
            ## Legado ${{ inputs.tag }}

            **架构**: ${{ inputs.arch }}

            从 GitHub Actions 手动构建发布。
          draft: false
          prerelease: false
          make_latest: true
          files: app/*/release/Legado-${{ inputs.tag }}-${{ inputs.arch }}.apk
